name: Update and deploy dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"
    - cron: "0 11 * * *"

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Update dashboard data
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: node update-dashboard.mjs

      - name: Refresh public site files
        run: |
          mkdir -p site-public
          cp index.html site-public/index.html
          cp styles.css site-public/styles.css
          cp app.js site-public/app.js

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js site-public/index.html site-public/styles.css site-public/app.js
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
          else
            git commit -m "chore: update dashboard snapshot"
            git push
          fi

      - name: Publish gh-pages branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          rm -rf /tmp/dataflow-pages
          mkdir -p /tmp/dataflow-pages
          cp -R site-public/. /tmp/dataflow-pages/
          git -C /tmp/dataflow-pages init
          git -C /tmp/dataflow-pages checkout -b gh-pages
          git -C /tmp/dataflow-pages config user.name "github-actions[bot]"
          git -C /tmp/dataflow-pages config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C /tmp/dataflow-pages add .
          git -C /tmp/dataflow-pages commit -m "Deploy dashboard"
          git -C /tmp/dataflow-pages remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git -C /tmp/dataflow-pages push --force origin gh-pages
