name: Update and deploy dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"
    - cron: "0 11 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update dashboard data
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: node update-dashboard.mjs

      - name: Refresh public site files
        run: |
          mkdir -p site-public
          cp index.html site-public/index.html
          cp styles.css site-public/styles.css
          cp app.js site-public/app.js

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js site-public/index.html site-public/styles.css site-public/app.js
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
          else
            git commit -m "chore: update dashboard snapshot"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site-public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
